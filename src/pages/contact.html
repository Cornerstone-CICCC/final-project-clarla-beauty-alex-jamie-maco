<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Contact Us | BC Beauty</title>
		<link rel="stylesheet" href="../css/contact.css" />
	</head>
	<body>
		<header class="header"></header>

		<main class="contact-page">
			<section class="contact-header">
				<h1 class="main-title">CONTACT</h1>
				<p class="line">__________________________</p>
				<p class="subtitle">
					Get a quote and book a free consultation for your <br />
					special day or our academy services
				</p>

				<div class="social-links">
					<a href="tel:+10000000000">
						<img src="../assets/icons/contact-icons/phone.svg" alt="phone" /> +1
						0000000000
					</a>
					<a href="#">
						<img
							src="../assets/icons/contact-icons/whatsApp.svg"
							alt="whatsApp"
						/>
						+1 0000000000
					</a>
					<a href="#">
						<img src="../assets/icons/contact-icons/ig.svg" alt="ig" />
						carlabeatrizs_
					</a>
				</div>
			</section>

			<!--   Select Type   -->
			<section class="form-container">
				<div class="tab-nav">
					<button class="tab-btn active">Services</button>
					<button class="tab-btn">Classes</button>
				</div>

				<!-- -- Event Type -- -->
				<form id="detailedContactForm" class="beauty-form">
					<div class="form-section">
						<h3>Event Type</h3>
						<div class="selection-group">
							<label class="select-box">
								<input type="radio" name="event_type" value="wedding" checked />
								<span
									>Wedding <img src="../assets/icons/check.svg" alt="check"
								/></span>
							</label>
							<label class="select-box">
								<input type="radio" name="event_type" value="party" />
								<span
									>Party <img src="../assets/icons/check.svg" alt="check"
								/></span>
							</label>
							<label class="select-box">
								<input type="radio" name="event_type" value="photoshoot" />
								<span
									>Photoshoot <img src="../assets/icons/check.svg" alt="check"
								/></span>
							</label>
						</div>
					</div>

					<!-- -- Event Date & Time -- -->
					<div class="form-row">
						<div class="form-section">
							<h3>Event Date</h3>
							<input type="date" class="input-field" />
							<label class="checkbox-label"
								><input type="checkbox" /> Not decided</label
							>
						</div>
						<div class="form-section">
							<h3>Event Time</h3>
							<select class="input-field">
								<option>Full day</option>
								<option>Morning</option>
								<option>Afternoon</option>
							</select>
							<label class="checkbox-label"
								><input type="checkbox" /> Not decided</label
							>
						</div>
					</div>

					<!-- -- Name -- -->
					<div class="form-section">
						<h3>Name</h3>
						<input type="text" placeholder="Your name" class="input-field" />
					</div>

					<!-- -- Contact Type -- -->
					<div class="form-section">
						<h3>Contact</h3>
						<div class="contact-options">
							<label class="radio-label">
								<input
									type="radio"
									name="contact_method"
									value="call"
									checked
								/>
								<span class="radio-dot"></span>
								<span>Call</span>
							</label>
							<input
								type="tel"
								placeholder="+1 Your mobile number"
								class="input-field tel-input"
							/>
							<label class="radio-label">
								<input type="radio" name="contact_method" value="whatsapp" />
								<span class="radio-dot"></span>
								<span>WhatsApp</span>
							</label>
							<label class="radio-label">
								<input type="radio" name="contact_method" value="sms" />
								<span class="radio-dot"></span>
								<span>SMS</span>
							</label>
							<label class="radio-label">
								<input type="radio" name="contact_method" value="email" />
								<span class="radio-dot"></span>
								<span>Email</span>
							</label>
						</div>
					</div>

					<!-- -- Call Time -- -->
					<div class="form-section">
						<h3>When do you want us to call?</h3>
						<div class="radio-group">
							<label class="radio-label">
								<input
									type="radio"
									name="call_time"
									value="no_preference"
									checked
								/>
								<span class="radio-dot"></span>
								<span>I don't mind</span>
							</label>
							<label class="radio-label">
								<input type="radio" name="call_time" value="morning" />
								<span class="radio-dot"></span>
								<span>Morning</span>
							</label>
							<label class="radio-label">
								<input type="radio" name="call_time" value="afternoon" />
								<span class="radio-dot"></span>
								<span>Afternoon</span>
							</label>
							<label class="radio-label">
								<input type="radio" name="call_time" value="evening" />
								<span class="radio-dot"></span>
								<span>Evening</span>
							</label>
						</div>
					</div>

					<button type="submit" class="btn-next">Next</button>
				</form>
			</section>
		</main>

		<footer class="footer"></footer>

		<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
		<script src="js/contact.js"></script>
	</body>
</html>
